name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        run: |
          latest_xcode="$(ls -d /Applications/Xcode*.app | sort -V | tail -n1)"
          echo "DEVELOPER_DIR=${latest_xcode}/Contents/Developer" >> "$GITHUB_ENV"

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test

      - name: Verify Homebrew formula
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: ./scripts/verify_homebrew_formula.sh
